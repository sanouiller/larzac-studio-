<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiches Personnages — Club Audiovisuel</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--cream:#f5f0e8;--dark:#1a1a18;--gold:#c9a84c;--grey:#7a7a72;--lg:#d4cfc5;--paper:#ede8dc;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);font-family:'Courier Prime',monospace;color:var(--cream);min-height:100vh;}
#filmstrip{padding:6px 10px;display:flex;gap:10px;overflow:hidden;border-bottom:3px solid var(--gold);transition:border-color .5s;}
.hole{width:13px;height:9px;border-radius:3px;background:var(--grey);opacity:.3;flex-shrink:0;}
#header{padding:14px 24px 8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.clap{width:42px;height:42px;background:var(--cream);position:relative;border-radius:3px;flex-shrink:0;overflow:hidden;display:flex;align-items:flex-end;}
.clap-s{position:absolute;top:0;left:0;right:0;height:50%;background:repeating-linear-gradient(90deg,#1a1a18 0,#1a1a18 6px,#f5f0e8 6px,#f5f0e8 12px);}
.clap-b{width:100%;height:55%;background:var(--cream);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:6px;color:var(--dark);letter-spacing:1px;}
#app-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;line-height:1;}
#title-accent{transition:color .5s;}
#app-sub{font-size:9px;color:var(--grey);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
#header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
#film-input{background:transparent;border:none;border-bottom:1px dashed #444;color:var(--gold);font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;outline:none;padding:3px 4px;width:160px;}
#film-input::placeholder{color:#444;}
#tabs{padding:0 24px 10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
#prog-wrap{padding:0 24px 12px;}
.prog-lbl{display:flex;justify-content:space-between;font-size:9px;letter-spacing:2px;color:var(--grey);text-transform:uppercase;margin-bottom:4px;}
.prog-track{height:2px;background:#2a2a28;border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;transition:width .5s;}
.prog-dots{display:flex;gap:6px;margin-top:7px;}
.dot{width:6px;height:6px;border-radius:50%;background:#2a2a28;transition:all .3s;display:inline-block;}
#main{padding:0 24px 60px;max-width:760px;margin:0 auto;}
.card{background:var(--paper);color:var(--dark);border-radius:2px;padding:26px 30px;position:relative;box-shadow:0 12px 40px rgba(0,0,0,.4);}
.card-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:2px 0 0 2px;transition:background .5s;}
.scene-num{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:3px;}
.scene-title{font-family:'Special Elite',cursive;font-size:19px;color:var(--dark);margin-bottom:4px;line-height:1.2;}
.scene-hint{font-size:12px;color:var(--grey);font-style:italic;margin-bottom:18px;line-height:1.5;border-left:2px solid var(--lg);padding-left:10px;}
.field-wrap{margin-bottom:18px;}
.field-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-bottom:3px;}
input[type=text],textarea{width:100%;background:transparent;border:none;border-bottom:2px solid var(--lg);padding:7px 3px;font-family:'Courier Prime',monospace;font-size:13px;color:var(--dark);outline:none;margin-top:2px;transition:border-color .2s;}
input[type=text]:focus,textarea:focus{border-bottom-color:#c0392b;}
textarea{min-height:65px;resize:none;line-height:1.5;display:block;}
.rg{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.rb{font-size:11px;padding:5px 10px;border:1.5px solid var(--lg);border-radius:2px;background:transparent;color:var(--dark);cursor:pointer;transition:all .15s;font-family:'Courier Prime',monospace;}
.rb.sel{color:#fff;font-weight:700;}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:5px;margin-top:5px;}
.tb{padding:5px 6px;border:1.5px solid var(--lg);background:transparent;color:var(--dark);font-family:'Courier Prime',monospace;font-size:10px;cursor:pointer;border-radius:2px;transition:all .15s;}
.tb.sel{color:#fff;font-weight:700;}
.tip-btn{background:none;border:none;color:var(--gold);font-size:11px;cursor:pointer;padding:4px 0 0;font-family:'Courier Prime',monospace;display:block;}
.tip-box{margin-top:6px;background:#fffcf0;border:1px solid var(--gold);border-left:3px solid var(--gold);padding:10px 14px;font-size:12px;color:#5a4a1a;line-height:1.65;border-radius:0 2px 2px 0;}
.coh-wrap{margin-top:18px;border:1px solid var(--lg);border-radius:2px;overflow:hidden;}
.coh-hdr{background:var(--dark);color:var(--cream);padding:7px 14px;font-size:10px;letter-spacing:2px;text-transform:uppercase;}
.coh-item{display:flex;gap:10px;padding:8px 14px;border-top:1px solid var(--lg);}
.coh-item:nth-child(even){background:#faf9f5;}
.coh-dot{font-size:10px;font-weight:700;white-space:nowrap;margin-top:1px;}
.coh-msg{font-size:12px;color:var(--dark);line-height:1.5;}
.nav-row{display:flex;justify-content:space-between;margin-top:20px;}
.btn{font-family:'Bebas Neue',sans-serif;letter-spacing:3px;font-size:12px;padding:8px 18px;border:2px solid currentColor;background:transparent;cursor:pointer;border-radius:2px;transition:all .2s;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
/* Fiche */
.fiche{background:var(--cream);color:var(--dark);padding:26px 30px;position:relative;}
.fiche-bl{position:absolute;top:0;left:0;bottom:0;width:4px;}
.fiche-br{position:absolute;top:0;right:0;bottom:0;width:4px;opacity:.25;}
.fiche-hdr{border-bottom:2px double var(--dark);padding-bottom:12px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.fiche-nom{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;line-height:1;}
.fiche-meta{font-size:9px;letter-spacing:2px;color:var(--grey);text-transform:uppercase;margin-top:2px;}
.fiche-film{font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.fiche-stamp{font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:1px;padding:3px 8px;transform:rotate(-4deg);flex-shrink:0;border:1.5px solid;}
.fiche-cit{padding:12px 18px 12px 22px;margin-bottom:14px;position:relative;overflow:hidden;}
.fiche-cit-mark{position:absolute;top:-6px;left:8px;font-size:44px;color:#fff;opacity:.15;font-family:Georgia,serif;line-height:1;}
.fiche-cit-txt{font-family:'Special Elite',cursive;font-size:13px;color:#fff;line-height:1.5;font-style:italic;position:relative;}
.fiche-sec{margin-bottom:14px;}
.fiche-sec-ttl{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;border-bottom:1px solid var(--lg);padding-bottom:2px;margin-bottom:8px;}
.fiche-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px 18px;}
.ff label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--grey);display:block;margin-bottom:1px;}
.ff p{font-family:'Special Elite',cursive;font-size:12px;color:var(--dark);line-height:1.45;min-height:16px;}
.ff-full{grid-column:1/-1;}
.fiche-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.ftag{color:#fff;font-size:9px;padding:1px 7px;border-radius:2px;font-family:'Courier Prime',monospace;}
/* Frise */
.frise{position:relative;padding:8px 0 4px;}
.frise-line{position:absolute;top:22px;left:20px;right:20px;height:2px;border-radius:2px;}
.frise-items{display:flex;justify-content:space-between;position:relative;}
.frise-item{display:flex;flex-direction:column;align-items:center;flex:1;}
.frise-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;z-index:1;margin-bottom:6px;border:2px solid;}
.frise-lbl{font-family:'Bebas Neue',sans-serif;font-size:8px;letter-spacing:2px;text-align:center;margin-bottom:3px;}
.frise-txt{font-family:'Special Elite',cursive;font-size:10px;color:var(--dark);line-height:1.4;text-align:center;padding:0 3px;}
/* Relations table */
.rel-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.rel-tbl th,.rel-tbl td{padding:8px 10px;}
/* Galerie */
.gal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.gal-ttl{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;}
.perso-block{margin-bottom:20px;box-shadow:0 12px 40px rgba(0,0,0,.4);}
/* Tab buttons */
.tab-btn{font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:11px;padding:5px 12px;border:1.5px solid #333;background:#222;color:var(--grey);cursor:pointer;border-radius:2px;transition:all .2s;}
.tab-btn.active{color:#fff;}
.tab-add{border-style:dashed!important;border-color:#444!important;color:#555!important;}
.tab-view{margin-left:8px;}
.gls-btn{font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:11px;padding:6px 12px;border:1.5px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer;border-radius:2px;}
/* ── TEMPLATE GALLERY ── */
#tpl-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:1100;flex-direction:column;overflow:hidden;}
#tpl-overlay.open{display:flex;}
#tpl-modal{display:flex;flex-direction:column;height:100%;max-width:900px;width:100%;margin:0 auto;}
.tpl-topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:2px solid #2a2a28;flex-shrink:0;gap:12px;flex-wrap:wrap;}
.tpl-topbar-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:var(--cream);}
.tpl-topbar-sub{font-size:10px;color:var(--grey);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.tpl-close{background:none;border:none;color:var(--grey);cursor:pointer;font-size:20px;line-height:1;}
.tpl-filters{display:flex;gap:6px;padding:12px 24px;border-bottom:1px solid #2a2a28;flex-shrink:0;flex-wrap:wrap;}
.tpl-filter-btn{font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:10px;padding:5px 14px;border:1.5px solid #333;background:transparent;color:#666;cursor:pointer;border-radius:2px;transition:all .2s;}
.tpl-filter-btn.active{color:var(--dark);}
.tpl-body{overflow-y:auto;flex:1;padding:20px 24px 32px;}
.tpl-section-ttl{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:4px;color:var(--grey);margin:18px 0 10px;text-transform:uppercase;}
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:24px;}
.tpl-card{background:#1e1e1c;border-radius:2px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;border:1.5px solid #2a2a28;}
.tpl-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.5);}
.tpl-card.tpl-selected{border-color:var(--gold);}
.tpl-card-banner{padding:12px 14px 10px;position:relative;}
.tpl-card-icon{font-size:22px;margin-bottom:6px;display:block;}
.tpl-card-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:#fff;line-height:1.1;}
.tpl-card-cat{font-size:8px;letter-spacing:2px;text-transform:uppercase;opacity:.7;margin-top:2px;color:#fff;}
.tpl-card-body{padding:10px 14px 12px;}
.tpl-card-tagline{font-family:'Special Elite',cursive;font-size:11px;color:var(--grey);line-height:1.5;margin-bottom:8px;font-style:italic;}
.tpl-card-traits{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.tpl-chip{font-size:8px;padding:2px 7px;border-radius:2px;font-family:'Courier Prime',monospace;color:#fff;}
.tpl-card-peur-desir{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.tpl-pd-item{background:#151513;border-radius:2px;padding:6px 8px;}
.tpl-pd-lbl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-bottom:2px;}
.tpl-pd-val{font-size:10px;color:var(--cream);line-height:1.4;}
.tpl-card-refs{font-size:9px;color:#555;font-style:italic;margin-bottom:10px;}
.tpl-card-actions{display:flex;gap:6px;}
.tpl-btn-use{flex:1;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:11px;padding:7px 10px;border:none;cursor:pointer;border-radius:2px;color:#fff;transition:opacity .15s;}
.tpl-btn-use:hover{opacity:.85;}
.tpl-btn-adapt{font-family:'Bebas Neue',sans-serif;letter-spacing:1px;font-size:10px;padding:7px 10px;border:1.5px solid #333;background:transparent;color:#666;cursor:pointer;border-radius:2px;transition:all .2s;white-space:nowrap;}
.tpl-btn-adapt:hover{border-color:var(--gold);color:var(--gold);}
/* zero state / blank card */
.tpl-card-blank{background:#151513;border:1.5px dashed #2a2a28;border-radius:2px;cursor:pointer;padding:24px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;transition:border-color .2s;min-height:160px;}
.tpl-card-blank:hover{border-color:#555;}
.tpl-card-blank-icon{font-size:28px;opacity:.4;}
.tpl-card-blank-lbl{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:3px;color:#444;text-align:center;}
/* Adapt mode diff panel */
.adapt-diff{background:#151513;border-radius:2px;padding:14px 16px;margin-top:12px;border:1px solid #2a2a28;}
.adapt-diff-ttl{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:3px;color:var(--gold);margin-bottom:10px;}
.adapt-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #2a2a28;}
.adapt-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.adapt-key{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--grey);min-width:80px;flex-shrink:0;padding-top:2px;}
.adapt-from{font-size:10px;color:#555;flex:1;font-style:italic;line-height:1.4;text-decoration:line-through;}
.adapt-arrow{color:var(--gold);font-size:10px;flex-shrink:0;}
.adapt-to{font-size:10px;color:var(--cream);flex:1;line-height:1.4;}
/* Glossaire */
#gls-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center;padding:20px;}
#gls-overlay.open{display:flex;}
#gls-modal{background:var(--paper);color:var(--dark);border-radius:2px;max-width:560px;width:100%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.6);}
.gls-hdr{background:var(--dark);color:var(--cream);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;}
.gls-ttl{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:3px;}
.gls-close{background:none;border:none;color:var(--cream);cursor:pointer;font-size:18px;}
.gls-search{padding:10px 20px;border-bottom:1px solid var(--lg);}
.gls-search input{width:100%;border:none;border-bottom:2px solid var(--lg);background:transparent;padding:6px 2px;font-family:'Courier Prime',monospace;font-size:13px;color:var(--dark);outline:none;}
.gls-list{overflow:auto;flex:1;}
.gls-item{padding:11px 20px;border-bottom:1px solid var(--lg);}
.gls-mot{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--gold);margin-bottom:3px;}
.gls-def{font-size:12px;color:var(--dark);line-height:1.6;}
/* Quiz */
.quiz-wrap{padding:16px 0;}
.quiz-prog{display:flex;gap:6px;margin-bottom:14px;}
.quiz-prog-seg{flex:1;height:3px;border-radius:2px;}
.quiz-qnum{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:5px;}
.quiz-q{font-family:'Special Elite',cursive;font-size:17px;color:var(--dark);line-height:1.4;margin-bottom:18px;}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
.quiz-opt{text-align:left;padding:10px 14px;border:1.5px solid var(--lg);border-radius:2px;background:#fff;color:var(--dark);font-family:'Courier Prime',monospace;font-size:13px;cursor:pointer;transition:all .15s;}
.quiz-opt.chosen{color:#fff;font-weight:700;}
.quiz-opt.locked{cursor:default;}
.quiz-tip{background:#fffcf0;border:1px solid var(--gold);border-left:3px solid var(--gold);padding:10px 14px;font-size:12px;color:#5a4a1a;line-height:1.6;margin-bottom:14px;}
.quiz-result-item{margin-bottom:14px;border:1px solid var(--lg);border-radius:2px;overflow:hidden;}
.quiz-result-q{padding:8px 14px;font-size:12px;font-weight:700;color:#fff;}
.quiz-result-body{padding:10px 14px;}
.quiz-result-ans{margin-bottom:8px;font-size:12px;}
/* fiche action btns */
.fiche-btns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
/* Relation cards */
.rel-card{background:var(--paper);border-radius:2px;box-shadow:0 4px 16px rgba(0,0,0,.25);overflow:hidden;display:flex;align-items:stretch;margin-bottom:8px;}
.rel-card-bar{width:4px;flex-shrink:0;}
.rel-card-body{padding:11px 16px;flex:1;}
.rel-card-names{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px;}
.rel-card-from{font-family:'Bebas Neue',sans-serif;font-size:14px;}
.rel-card-arrow{font-size:16px;color:var(--grey);}
.rel-card-to{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--dark);}
.rel-card-lien{font-family:'Special Elite',cursive;font-size:12px;color:var(--dark);line-height:1.5;}
/* View toggle for relations */
.rel-view-btn{font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:10px;padding:5px 11px;border:1.5px solid #444;background:transparent;color:#666;cursor:pointer;border-radius:2px;transition:all .2s;}
.rel-view-btn.active{background:var(--gold);border-color:var(--gold);color:var(--dark);}
/* print */
@media print{
  body{background:white;}
  #filmstrip,#header,#tabs,#prog-wrap,#gls-overlay,.nav-row,.fiche-btns,.gal-hdr,#quiz-zone{display:none!important;}
  #main{padding:0;max-width:100%;}
  .perso-block{page-break-after:always;box-shadow:none!important;}
  .fiche{box-shadow:none;}
}
@media(max-width:560px){
  #main{padding:0 12px 48px;}
  .card{padding:20px 16px;}
  .fiche{padding:20px 16px;}
  .fiche-grid{grid-template-columns:1fr;}
  .frise-items{flex-direction:column;gap:12px;}
  .frise-line{display:none;}
}
</style>
</head>
<body>

<div id="filmstrip"></div>

<div id="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="clap"><div class="clap-s"></div><div class="clap-b">PERSO</div></div>
    <div>
      <div id="app-title">FICHES <span id="title-accent" style="color:var(--gold)">PERSONNAGES</span></div>
      <div id="app-sub">Club audiovisuel — Court-métrage</div>
    </div>
  </div>
  <div id="header-right">
    <input id="film-input" type="text" placeholder="Titre du film..." oninput="S.filmTitle=this.value;renderTabs();">
    <button class="gls-btn" onclick="openGls()">📖 Glossaire</button>
  </div>
</div>

<div id="tabs"></div>
<div id="prog-wrap">
  <div class="prog-lbl"><span id="pl-step"></span><span id="pl-name"></span></div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  <div class="prog-dots" id="prog-dots"></div>
</div>
<div id="main"></div>

<!-- TEMPLATE GALLERY -->
<div id="tpl-overlay" onclick="closeTplGallery(event)">
  <div id="tpl-modal" onclick="event.stopPropagation()">
    <div class="tpl-topbar">
      <div>
        <div class="tpl-topbar-title">GALERIE DE PERSONNAGES</div>
        <div id="tpl-topbar-sub" class="tpl-topbar-sub">Choisis un point de départ — tout est modifiable</div>
      </div>
      <button class="tpl-close" onclick="closeTplGallery()">✕</button>
    </div>
    <div class="tpl-filters" id="tpl-filters"></div>
    <div class="tpl-body" id="tpl-body"></div>
  </div>
</div>

<!-- GLOSSAIRE -->
<div id="gls-overlay" onclick="closeGls()">
  <div id="gls-modal" onclick="event.stopPropagation()">
    <div class="gls-hdr"><span class="gls-ttl">GLOSSAIRE CINÉMA</span><button class="gls-close" onclick="closeGls()">✕</button></div>
    <div class="gls-search"><input type="text" id="gls-input" placeholder="Rechercher..." oninput="renderGlsList(this.value)"></div>
    <div class="gls-list" id="gls-list"></div>
  </div>
</div>

const data=()=>S.personnages[S.actif]||{};
const accent=()=>getAccent(data());
const curEtape=()=>S.etapes[S.actif]||0;

function setField(key,val){S.personnages[S.actif][key]=val;}
function toggleTrait(val){
  const arr=S.personnages[S.actif].traits||[];
  if(arr.includes(val)){S.personnages[S.actif].traits=arr.filter(x=>x!==val);}
  else if(arr.length<5){S.personnages[S.actif].traits=[...arr,val];}
  else{alert("Maximum 5 traits !");return;}
  renderMain();
}
function toggleTraitCat(ci){
  S.traitsCatOpen[ci]=S.traitsCatOpen[ci]===false?true:false;
  renderMain();
}
function addCustomTrait(){
  const el=document.getElementById("trait_custom_input");
  if(!el) return;
  const val=el.value.trim();
  if(!val) return;
  const arr=S.personnages[S.actif].traits||[];
  if(arr.includes(val)){el.value="";return;}
  if(arr.length>=5){alert("Maximum 5 traits !");return;}
  S.personnages[S.actif].traits=[...arr,val];
  el.value="";
  renderMain();
}
function setRadio(fid,val){S.personnages[S.actif][fid]=val;render();}
function collectFields(){
  const step=STEPS[curEtape()];
  step.fields.forEach(f=>{
    if(f.type==="text"||f.type==="ta"){
      const el=document.getElementById("f_"+f.id);
      if(el) setField(f.id,el.value);
    }
  });
}

const COHER_C={ok:"#27ae60",tension:"#e67e22",conflit:"#2980b9",warning:"#c0392b",manque:"#8e44ad"};
function checkCoherence(d){
  const issues=[],t=d.traits||[];
  [["Impulsif·ve","Pragmatique","Contradiction forte — peut être riche si expliquée."],
   ["Empathique","Égoïste","Qu'est-ce qui fait basculer le personnage d'un côté ?"],
   ["Loyal·e","Calculateur·rice","Trahit-il·elle par calcul ? C'est un arc en soi."],
   ["Timide","Charismatique","Timide en privé, magnétique en public ? Explique ce double visage."],
   ["Naïf·ve","Méfiant·e","Ces traits s'excluent généralement. Lequel domine ?"],
  ].forEach(([a,b,msg])=>{if(t.includes(a)&&t.includes(b))issues.push({type:"tension",msg:`⚡ ${a} + ${b} : ${msg}`});});
  if(d.peur&&d.desir){
    const p=d.peur.toLowerCase(),ds=d.desir.toLowerCase();
    if((p.includes("seul")||p.includes("abandon"))&&(ds.includes("seul")||ds.includes("libert")))
      issues.push({type:"conflit",msg:"🎭 Peur de la solitude + désir de liberté : conflit intérieur très puissant. Exploite-le !"});
    if((p.includes("échec")||p.includes("rater"))&&(ds.includes("reconnu")||ds.includes("succès")))
      issues.push({type:"conflit",msg:"🎭 Peur de l'échec + désir de reconnaissance : ce personnage se sabote lui-même."});
  }
  if(d.debut&&d.fin&&d.debut.trim().toLowerCase()===d.fin.trim().toLowerCase())
    issues.push({type:"warning",msg:"⚠ État initial = état final : arc plat ou tragique. Choix assumé ?"});
  if(!d.peur&&t.length>0)issues.push({type:"manque",msg:"◎ Pas de peur définie : sans peur, le personnage manque de vulnérabilité."});
  if(t.length===1)issues.push({type:"manque",msg:"◎ Un seul trait : risque d'être unidimensionnel. Ajoute une contradiction."});
  if(!issues.length&&t.length>=3&&d.peur&&d.desir&&d.debut&&d.fin)
    issues.push({type:"ok",msg:"✓ Bonne cohérence ! Traits variés, peur, désir et arc bien définis."});
  return issues;
}

function buildQuiz(d){
  const q=[],nom=d.nom||"ton personnage",traits=d.traits||[];
  if(d.peur)q.push({q:`${nom} est seul·e face à sa plus grande peur. Que fait-il·elle en premier ?`,opts:["Il·elle fuit sans réfléchir","Il·elle reste paralysé·e","Il·elle cherche de l'aide","Il·elle fait face malgré tout"],tip:`Sa peur déclarée : "${d.peur}". Toute réaction doit découler de cette peur — et la montrer sans l'expliquer.`});
  if(d.desir)q.push({q:`On lui offre exactement ce qu'il·elle désire, mais au prix de trahir quelqu'un. Que choisit-il·elle ?`,opts:["Il·elle accepte sans hésiter","Il·elle refuse catégoriquement","Il·elle essaie de trouver une autre voie","Il·elle hésite puis cède"],tip:`Son désir profond : "${d.desir}". Ce choix révèle si son désir est plus fort que ses valeurs.`});
  if(traits.length>=2){const t1=traits[0],t2=traits[1];q.push({q:`Dans une dispute violente avec un proche, quel trait domine chez ${nom} ?`,opts:[t1,t2,"Il·elle se ferme complètement","Il·elle change de sujet"],tip:`Tu as choisi "${t1}" et "${t2}". En situation de conflit, lequel prend le dessus ? C'est souvent le plus négatif.`});}
  if(d.secret)q.push({q:`Quelqu'un découvre le secret de ${nom}. Quelle est sa réaction immédiate ?`,opts:["Il·elle nie en bloc","Il·elle attaque pour déstabiliser","Il·elle s'effondre","Il·elle négocie le silence"],tip:`Son secret : "${d.secret}". La réaction face à l'exposition révèle la vraie personnalité.`});
  if(d.debut&&d.fin)q.push({q:`À mi-parcours du film, ${nom} a l'occasion de revenir à sa vie d'avant. Que fait-il·elle ?`,opts:["Il·elle saisit l'occasion immédiatement","Il·elle hésite longuement puis refuse","Il·elle essaie mais échoue","Il·elle n'y pense même plus"],tip:`État initial : "${d.debut.slice(0,40)}…" → État final : "${d.fin.slice(0,40)}…". La tentation du retour en arrière est le test de la transformation.`});
  if(d.rel1_lien||d.rel2_lien)q.push({q:`${nom} doit choisir entre sauver un inconnu ou protéger la personne la plus proche. Il·elle choisit...`,opts:["L'inconnu, par principe moral","Le proche, sans hésiter","Il·elle essaie de sauver les deux","Il·elle est incapable de décider"],tip:`Ses relations définissent ses priorités. Ce choix révèle si ${nom} est guidé·e par l'intime ou par les valeurs.`});
  return q.slice(0,5);
}

// HTML FRISE
// ════════════════════════════════════════════
function friseHTML(d,ac){
  const events=[
    {key:"debut",label:"ÉTAT INITIAL",color:"#7a7a72"},
    {key:"declencheur",label:"DÉCLENCHEUR",color:ac},
    {key:"pivot",label:"POINT DE BASCULE",color:ac},
    {key:"fin",label:"ÉTAT FINAL",color:ac},
  ].filter(e=>d[e.key]);
  if(events.length<2)return`<p style="color:var(--grey);font-size:12px;font-style:italic;">Complète l'arc narratif pour voir la frise.</p>`;
  const w=100/events.length;
  let items=events.map((e,i)=>`
    <div class="frise-item" style="max-width:${w}%">
      <div class="frise-dot" style="background:${i===0?"#7a7a72":ac};border-color:${i===0?"#7a7a72":ac}">${i+1}</div>
      <div class="frise-lbl" style="color:${i===0?"var(--grey)":ac}">${e.label}</div>
      <div class="frise-txt">${d[e.key].length>55?d[e.key].slice(0,55)+"…":d[e.key]}</div>
    </div>`).join("");
  return`<div class="frise">
    <div class="frise-line" style="background:linear-gradient(90deg,var(--lg),${ac})"></div>
    <div class="frise-items">${items}</div>
  </div>`;
}

// ════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════
function render(){
  const ac=accent();
  document.getElementById("filmstrip").style.borderBottomColor=ac;
  document.getElementById("title-accent").style.color=ac;
  renderTabs();
  const pw=document.getElementById("prog-wrap");
  if(S.vue==="edition"){
    pw.style.display="block";
    const cur=curEtape(),tot=STEPS.length;
    document.getElementById("pl-step").textContent=`Étape ${cur+1} / ${tot}`;
    const pln=document.getElementById("pl-name");pln.textContent=STEPS[cur].label;pln.style.color=ac;
    const pf=document.getElementById("prog-fill");
    pf.style.width=`${(cur/(tot-1))*100}%`;
    pf.style.background=`linear-gradient(90deg,var(--gold),${ac})`;
    const dots=document.getElementById("prog-dots");dots.innerHTML="";
    STEPS.forEach((_,i)=>{
      const d=document.createElement("div");d.className="dot";
      d.style.background=i<cur?"var(--gold)":i===cur?ac:"#2a2a28";
      d.style.transform=i===cur?"scale(1.4)":"none";
      dots.appendChild(d);
    });
  } else { pw.style.display="none"; }
  renderMain();
}

function renderTabs(){
  const ac=accent();
  const t=document.getElementById("tabs");t.innerHTML="";
  S.personnages.forEach((p,i)=>{
    const th=getTheme(p.role);const isA=S.actif===i&&S.vue==="edition";
    const btn=document.createElement("button");btn.className="tab-btn"+(isA?" active":"");
    const nom=p.nom||`Perso ${i+1}`;
    const auteurTag=p.auteur?` · ${p.auteur}`:"";
    btn.textContent=nom+(S.finis.includes(i)?" ✓":"")+auteurTag;
    btn.style.borderColor=isA?th.accent:"#333";btn.style.background=isA?th.accent:"#222";
    if(isA)btn.style.color="#fff";
    btn.onclick=()=>{collectFields();S.actif=i;S.vue="edition";render();};
    t.appendChild(btn);
  });
  const add=document.createElement("button");add.className="tab-btn tab-add";add.textContent="+ Nouveau perso";
  add.onclick=()=>{collectFields();openTplGallery(null);};
  t.appendChild(add);
  if(S.finis.length>=1){
    const g=document.createElement("button");g.className="tab-btn tab-view";g.textContent="Galerie";
    g.style.borderColor=S.vue==="galerie"?"var(--cream)":"#444";g.style.background=S.vue==="galerie"?"var(--cream)":"transparent";g.style.color=S.vue==="galerie"?"var(--dark)":"#666";
    g.onclick=()=>{collectFields();S.vue="galerie";S.quizPerso=null;render();};t.appendChild(g);
  }
  if(S.finis.length>=2){
    const r=document.createElement("button");r.className="tab-btn tab-view";r.textContent="Relations";
    r.style.borderColor=S.vue==="relations"?"var(--gold)":"#444";r.style.background=S.vue==="relations"?"var(--gold)":"transparent";r.style.color=S.vue==="relations"?"var(--dark)":"#666";
    r.onclick=()=>{collectFields();S.vue="relations";render();};t.appendChild(r);
  }
}

function renderMain(){
  const main=document.getElementById("main");
  if(S.vue==="edition") main.innerHTML=renderEdition();
  else if(S.vue==="galerie") main.innerHTML=renderGalerie();
  else if(S.vue==="relations") main.innerHTML=renderRelations();
  if(S.vue==="edition") bindFields();
}

// ── ÉDITION ──
function renderEdition(){
  const d=data(),ac=accent(),cur=curEtape(),step=STEPS[cur],isLast=cur===STEPS.length-1;
  let fields="";
  step.fields.forEach(f=>{
    const tipOpen=S.tipsOpen[f.id]||false;
    fields+=`<div class="field-wrap"><div class="field-lbl">${f.label}</div>`;
    if(f.type==="text") fields+=`<input type="text" id="f_${f.id}" value="${(d[f.id]||"").replace(/"/g,"&quot;")}" placeholder="${(f.ph||"").replace(/"/g,"&quot;")}">`;
    else if(f.type==="ta") fields+=`<textarea id="f_${f.id}" placeholder="${(f.ph||"").replace(/"/g,"&quot;")}">${d[f.id]||""}</textarea>`;
    else if(f.type==="radio"){
      fields+=`<div class="rg">`;
      f.opts.forEach(o=>{
        const sel=d[f.id]===o;
        const bg=f.id==="role"?(ROLE_THEMES[o]?.accent||ac):ac;
        fields+=`<button class="rb${sel?" sel":""}" style="${sel?`background:${bg};border-color:${bg};`:""}" onclick="setRadio('${f.id}','${o}')">${o}</button>`;
      });
      fields+=`</div>`;
    } else if(f.type==="traits"){
      const allPredefined=f.cats.flatMap(c=>c.opts);
      const customTraits=(d.traits||[]).filter(t=>!allPredefined.includes(t));
      // Category toggle state
      if(!S.traitsCatOpen) S.traitsCatOpen={};
      f.cats.forEach((cat,ci)=>{
        const isOpen=S.traitsCatOpen[ci]!==false;
        fields+=`<div style="margin-bottom:8px;">
          <button onclick="toggleTraitCat(${ci})" style="background:none;border:none;cursor:pointer;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--grey);font-family:'Courier Prime',monospace;padding:3px 0;display:flex;align-items:center;gap:6px;">
            <span style="font-size:8px;">${isOpen?"▼":"▶"}</span>${cat.label}
          </button>`;
        if(isOpen){
          fields+=`<div class="tg" style="margin-top:4px;">`;
          cat.opts.forEach(o=>{
            const sel=(d.traits||[]).includes(o);
            fields+=`<button class="tb${sel?" sel":""}" style="${sel?`background:${ac};border-color:${ac};`:""}" onclick="toggleTrait('${o.replace(/'/g,"\\'")}')">${o}</button>`;
          });
          fields+=`</div>`;
        }
        fields+=`</div>`;
      });
      // Custom tags déjà saisis
      if(customTraits.length){
        fields+=`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;">`;
        customTraits.forEach(t=>{
          fields+=`<span style="display:inline-flex;align-items:center;gap:5px;background:${ac};color:#fff;font-size:10px;padding:4px 10px;border-radius:2px;font-family:'Courier Prime',monospace;">
            ${t}
            <button onclick="toggleTrait('${t.replace(/'/g,"\\'")}');renderMain()" style="background:none;border:none;color:#fff;cursor:pointer;font-size:12px;line-height:1;padding:0;opacity:0.8;">×</button>
          </span>`;
        });
        fields+=`</div>`;
      }
      // Champ saisie manuelle
      const remaining=5-(d.traits||[]).length;
      fields+=`<div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
        <input type="text" id="trait_custom_input" placeholder="Ton propre trait…" style="flex:1;font-size:12px;" ${remaining<=0?"disabled":""} onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomTrait();}">
        <button onclick="addCustomTrait()" style="flex-shrink:0;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:11px;padding:7px 14px;border:1.5px solid ${remaining>0?ac:"var(--lg)"};background:${remaining>0?ac:"transparent"};color:${remaining>0?"#fff":"var(--grey)"};cursor:${remaining>0?"pointer":"not-allowed"};border-radius:2px;transition:all .2s;" ${remaining<=0?"disabled":""}>+ Ajouter</button>
      </div>
      <div style="font-size:10px;color:var(--grey);margin-top:4px;">${remaining>0?`${remaining} emplacement${remaining>1?"s":""} restant${remaining>1?"s":""}`:`Maximum atteint (5 traits)`}</div>`;
    }
    if(TIPS[f.id]){
      fields+=`<button class="tip-btn" onclick="toggleTip('${f.id}')">${tipOpen?"▲":"▼"} Conseil scénariste</button>`;
      if(tipOpen) fields+=`<div class="tip-box">${TIPS[f.id]}</div>`;
    }
    fields+=`</div>`;
  });
  let coh="";
  if(cur===3||cur===STEPS.length-1){
    const issues=checkCoherence(d);
    if(issues.length){
      coh=`<div class="coh-wrap"><div class="coh-hdr">Analyse de cohérence — ${issues.length} point${issues.length>1?"s":""}</div>`;
      issues.forEach((iss,i)=>{coh+=`<div class="coh-item"${i%2?` style="background:#faf9f5"`:""}>
        <span class="coh-dot" style="color:${COHER_C[iss.type]||"#666"}">■</span>
        <span class="coh-msg">${iss.msg}</span></div>`;});
      coh+=`</div>`;
    }
  }
  return`<div class="card">
    <div class="card-bar" style="background:${ac}"></div>
    <div class="scene-num" style="color:${ac}">Scène ${cur+1} — ${step.label.toUpperCase()}</div>
    <div class="scene-title">${step.title}</div>
    <div class="scene-hint">${step.hint}</div>
    ${fields}${coh}
    <div class="nav-row">
      <button class="btn" style="color:var(--grey);border-color:var(--grey)" onclick="prevStep()" ${cur===0?"disabled":""}>← Retour</button>
      ${isLast
        ?`<button class="btn" style="color:var(--gold);border-color:var(--gold)" onclick="terminer()">✓ Valider ce personnage</button>`
        :`<button class="btn" style="color:${ac};border-color:${ac}" onclick="nextStep()">Suivant →</button>`
      }
    </div>
  </div>`;
}

function bindFields(){
  const step=STEPS[curEtape()];
  step.fields.forEach(f=>{
    if(f.type==="text"||f.type==="ta"){
      const el=document.getElementById("f_"+f.id);
      if(el) el.addEventListener("input",()=>setField(f.id,el.value));
    }
  });
}

function toggleTip(fid){S.tipsOpen[fid]=!S.tipsOpen[fid];renderMain();}
function prevStep(){collectFields();S.etapes[S.actif]=Math.max(0,curEtape()-1);render();}
function nextStep(){collectFields();S.etapes[S.actif]=Math.min(STEPS.length-1,curEtape()+1);render();}
function terminer(){collectFields();if(!S.finis.includes(S.actif))S.finis.push(S.actif);S.vue="galerie";S.quizPerso=null;render();}

// ── GALERIE ──
function renderGalerie(){
  const nb=S.finis.length;
  let html=`<div class="gal-hdr">
    <div class="gal-ttl">${S.filmTitle?S.filmTitle+" — ":""}GALERIE · ${nb} personnage${nb>1?"s":""}</div>
    <button class="btn" style="color:var(--cream);border-color:var(--cream);font-size:11px;padding:6px 14px;" onclick="printAll()">⬛ Imprimer tout + couverture</button>
  </div>`;
  if(S.quizPerso!==null){
    html+=renderQuizZone();
  } else {
    S.finis.forEach(i=>{
      const d=S.personnages[i],ac=getTheme(d.role).accent;
      html+=`<div class="perso-block">${ficheHTML(d,ac,i)}</div>`;
    });
  }
  return html;
}

// ── QUIZ ──
function startQuiz(idx){S.quizPerso=idx;S.quizIdx=0;S.quizAnswers={};S.quizDone=false;renderMain();}
function renderQuizZone(){
  const d=S.personnages[S.quizPerso],ac=getAccent(d);
  const questions=buildQuiz(d);
  if(!questions.length) return`<div class="card"><p style="color:var(--grey);text-align:center;margin-bottom:16px;">Complète davantage la fiche pour débloquer le quiz !</p><button class="btn" style="color:${ac};border-color:${ac}" onclick="S.quizPerso=null;renderMain()">← Retour</button></div>`;
  let html=`<div class="card" style="position:relative;">
    <div class="card-bar" style="background:${ac}"></div>
    <div class="scene-num" style="color:${ac}">Quiz — ${d.nom||"Personnage"}</div>
    <div class="scene-title">Connais-tu vraiment ce personnage ?</div>
    <div class="scene-hint">Réponds instinctivement — il n'y a pas de bonne réponse, seulement des révélations sur la cohérence de ton perso.</div>
    <div class="quiz-wrap" id="quiz-zone">`;
  if(S.quizDone){
    html+=`<div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:${ac};margin-bottom:4px;">RÉSULTAT DU QUIZ</div>
      <div style="font-size:12px;color:var(--grey);margin-bottom:18px;">${Object.keys(S.quizAnswers).length} question${Object.keys(S.quizAnswers).length>1?"s":""} répondue${Object.keys(S.quizAnswers).length>1?"s":""} sur ${questions.length}</div>`;
    questions.forEach((q,i)=>{
      const ans=S.quizAnswers[i];
      html+=`<div class="quiz-result-item">
        <div class="quiz-result-q" style="background:${ac}">Q${i+1} — ${q.q}</div>
        <div class="quiz-result-body">
          ${ans!==undefined?`<div class="quiz-result-ans"><span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--grey);">Ta réponse : </span><span style="font-family:'Special Elite',cursive;font-size:13px;">${q.opts[ans]}</span></div>`:""}
          <div class="quiz-tip">💡 ${q.tip}</div>
        </div>
      </div>`;
    });
    html+=`<div style="display:flex;gap:8px;margin-top:8px;">
      <button class="btn" style="color:var(--gold);border-color:var(--gold)" onclick="S.quizIdx=0;S.quizAnswers={};S.quizDone=false;renderMain()">↺ Recommencer</button>
      <button class="btn" style="color:var(--grey);border-color:var(--grey)" onclick="S.quizPerso=null;renderMain()">← Retour à la fiche</button>
    </div>`;
  } else {
    const q=questions[S.quizIdx],answered=S.quizAnswers[S.quizIdx]!==undefined;
    html+=`<div class="quiz-prog">${questions.map((_,i)=>`<div class="quiz-prog-seg" style="background:${i<=S.quizIdx?ac:"#ddd"};opacity:${i<S.quizIdx?1:i===S.quizIdx?1:0.3}"></div>`).join("")}</div>`;
    html+=`<div class="quiz-qnum" style="color:${ac}">Question ${S.quizIdx+1} / ${questions.length}</div>`;
    html+=`<div class="quiz-q">${q.q}</div>`;
    html+=`<div class="quiz-opts">`;
    q.opts.forEach((opt,i)=>{
      const chosen=S.quizAnswers[S.quizIdx]===i;
      html+=`<button class="quiz-opt${chosen?" chosen":""} ${answered?"locked":""}" style="${chosen?`background:${ac};border-color:${ac};color:#fff;`:""}" onclick="${answered?"":"quizAnswer("+i+")"}">${opt}</button>`;
    });
    html+=`</div>`;
    if(answered) html+=`<div class="quiz-tip">💡 ${q.tip}</div>`;
    html+=`<div style="display:flex;justify-content:space-between;">
      <button class="btn" style="color:var(--grey);border-color:var(--grey)" onclick="S.quizPerso=null;renderMain()">✕ Quitter</button>
      ${answered?(S.quizIdx<questions.length-1
        ?`<button class="btn" style="color:${ac};border-color:${ac}" onclick="S.quizIdx++;renderMain()">Question suivante →</button>`
        :`<button class="btn" style="background:var(--gold);border-color:var(--gold);color:var(--dark)" onclick="S.quizDone=true;renderMain()">✓ Voir les résultats</button>`
      ):""}
    </div>`;
  }
  html+=`</div></div>`;
  return html;
}
function quizAnswer(i){S.quizAnswers[S.quizIdx]=i;renderMain();}

// ════════════════════════════════════════════
// RELATIONS — VUE PRINCIPALE
// ════════════════════════════════════════════
function getEdges(persos){
  const edges=[];
  persos.forEach(p=>{
    ["rel1","rel2","rel3","rel4"].forEach(r=>{
      if(p[r+"_nom"]&&p[r+"_lien"]){
        edges.push({from:p.nom,fromColor:getTheme(p.role).accent,to:p[r+"_nom"],lien:p[r+"_lien"]});
      }
    });
  });
  return edges;
}

function renderRelations(){
  if(!S.relView) S.relView="reseau";
  const persos=S.finis.map(i=>({...S.personnages[i],_idx:i})).filter(p=>p.nom);

      <div style="display:flex;gap:6px;">
        <button class="rel-view-btn${S.relView==="reseau"?" active":""}" ${btnStyle("reseau")} onclick="S.relView='reseau';renderMain()">🕸 Réseau</button>
        <button class="rel-view-btn${S.relView==="cartes"?" active":""}" ${btnStyle("cartes")} onclick="S.relView='cartes';renderMain()">🃏 Cartes</button>
        <button class="rel-view-btn${S.relView==="tableau"?" active":""}" ${btnStyle("tableau")} onclick="S.relView='tableau';renderMain()">📊 Tableau</button>
      </div>

    const edges=getEdges(persos);
    if(S.relView==="reseau") html+=renderRelReseau(persos,edges);
    else if(S.relView==="cartes") html+=renderRelCartes(persos,edges);

  </div>`;
  return html;
}

// ── VUE RÉSEAU (SVG) ──
function renderRelReseau(persos,edges){
  const n=persos.length;
  const W=620,H=360,cx=W/2,cy=H/2,r=Math.min(W,H)/2-58;
  const positions=persos.map((p,i)=>{
    const angle=(i/n)*2*Math.PI-Math.PI/2;
    return{x:cx+r*Math.cos(angle),y:cy+r*Math.sin(angle),p};
  });

  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;border-radius:2px;background:#ede8dc;display:block;">
    <defs>
      <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
        <path d="M0,0 L0,6 L6,3 z" fill="#aaa" opacity="0.6"/>
      </marker>
    </defs>`;

  // Draw edges
  edges.forEach(e=>{
    const fromPos=positions.find(pos=>pos.p.nom===e.from);
    const toPos=positions.find(pos=>pos.p.nom&&pos.p.nom.toLowerCase()===e.to.toLowerCase());
    if(fromPos&&toPos&&fromPos!==toPos){
      const dx=toPos.x-fromPos.x,dy=toPos.y-fromPos.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const nx=dx/dist,ny=dy/dist;
      const x1=fromPos.x+nx*32,y1=fromPos.y+ny*32;
      const x2=toPos.x-nx*35,y2=toPos.y-ny*35;
      const midX=(x1+x2)/2,midY=(y1+y2)/2;
      const shortLien=e.lien.length>22?e.lien.slice(0,22)+"…":e.lien;
      svg+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${e.fromColor}" stroke-width="1.5" stroke-opacity="0.5" marker-end="url(#arr)"/>`;
      svg+=`<text x="${midX.toFixed(1)}" y="${(midY-4).toFixed(1)}" text-anchor="middle" font-size="8" fill="${e.fromColor}" font-family="Courier Prime,monospace" opacity="0.9" paint-order="stroke" stroke="white" stroke-width="3">${shortLien}</text>`;
    }
  });

  // Draw nodes
  positions.forEach(({x,y,p})=>{
    const ac=getTheme(p.role).accent;
    svg+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="30" fill="${ac}" opacity="0.92"/>`;
    const words=(p.nom||"").split(" ");
    if(words.length<=1){
      svg+=`<text x="${x.toFixed(1)}" y="${(y+4).toFixed(1)}" text-anchor="middle" font-size="12" fill="white" font-weight="bold" font-family="Bebas Neue,sans-serif">${p.nom||"?"}</text>`;
    } else {
      svg+=`<text x="${x.toFixed(1)}" y="${(y-2).toFixed(1)}" text-anchor="middle" font-size="11" fill="white" font-weight="bold" font-family="Bebas Neue,sans-serif">${words[0]}</text>`;
      svg+=`<text x="${x.toFixed(1)}" y="${(y+11).toFixed(1)}" text-anchor="middle" font-size="10" fill="white" font-family="Bebas Neue,sans-serif">${words.slice(1).join(" ")}</text>`;
    }
    if(p.auteur){
      svg+=`<text x="${x.toFixed(1)}" y="${(y+23).toFixed(1)}" text-anchor="middle" font-size="7" fill="white" opacity="0.7" font-family="Courier Prime,monospace">par ${p.auteur}</text>`;
    }
    const lbl=getTheme(p.role).label;
    svg+=`<text x="${x.toFixed(1)}" y="${(y+40).toFixed(1)}" text-anchor="middle" font-size="7" fill="${ac}" font-family="Bebas Neue,sans-serif">${lbl}</text>`;
  });

  svg+=`</svg>`;

  // Legend
  const legend=Object.entries(ROLE_THEMES).filter(([k])=>k).map(([k,v])=>
    `<span style="display:inline-flex;align-items:center;gap:5px;margin-right:12px;font-size:10px;color:var(--grey);"><span style="width:10px;height:10px;border-radius:50%;background:${v.accent};display:inline-block;"></span>${v.label}</span>`
  ).join("");

  return`<div style="background:var(--paper);border-radius:2px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.4);">
    ${svg}
    <div style="padding:10px 16px;border-top:1px solid var(--lg);display:flex;flex-wrap:wrap;gap:4px;">${legend}</div>
  </div>`;
}

// ── VUE CARTES DE RELATION ──
function renderRelCartes(persos,edges){
  if(!edges.length){
    return`<div style="padding:20px;background:var(--paper);border-radius:2px;color:var(--grey);font-size:12px;text-align:center;font-style:italic;box-shadow:0 12px 40px rgba(0,0,0,.4);">
      Aucune relation déclarée. Remplis les champs "Relation A/B/C/D" dans les fiches pour les voir ici.
    </div>`;
  }
  let byFrom={};
  edges.forEach(e=>{
    if(!byFrom[e.from]) byFrom[e.from]={color:e.fromColor,rels:[]};
    byFrom[e.from].rels.push({to:e.to,lien:e.lien});
  });
  let html=`<div style="display:flex;flex-direction:column;gap:12px;">`;
  Object.entries(byFrom).forEach(([nom,{color,rels}])=>{
    html+=`<div style="background:var(--paper);border-radius:2px;box-shadow:0 4px 20px rgba(0,0,0,.25);overflow:hidden;">
      <div style="background:${color};padding:8px 16px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:white;">${nom}</div>
      <div>`;
    rels.forEach(({to,lien},i)=>{
      html+=`<div style="padding:10px 16px;${i>0?"border-top:1px solid var(--lg);":""}display:flex;align-items:flex-start;gap:12px;">
        <div style="flex-shrink:0;display:flex;align-items:center;gap:8px;min-width:120px;">
          <span style="font-size:16px;color:${color};">→</span>
          <span style="font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--dark);">${to}</span>
        </div>
        <div style="font-family:'Special Elite',cursive;font-size:12px;color:var(--dark);line-height:1.5;border-left:2px solid ${color};padding-left:10px;">${lien}</div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;
  return`<div style="box-shadow:none;">${html}</div>`;
}

// ── VUE TABLEAU ──
function renderRelTableau(persos){
  if(persos.length<2){return`<div style="padding:16px;color:var(--grey);font-size:12px;font-style:italic;text-align:center;">Pas assez de personnages nommés.</div>`;}
  const findLien=(rowP,colNom)=>{
    for(const r of["rel1","rel2","rel3","rel4"]){
      if((rowP[r+"_nom"]||"").toLowerCase().includes((colNom||"").toLowerCase())&&colNom) return rowP[r+"_lien"];
    }
    return null;
  };
  let tbl=`<div style="overflow-x:auto"><table class="rel-tbl"><thead><tr>
    <th style="background:var(--dark);color:var(--cream);text-align:left;font-size:10px;letter-spacing:2px;font-weight:400;">PERSONNAGE</th>
    ${persos.map(p=>`<th style="background:${getTheme(p.role).accent};color:#fff;text-align:center;font-size:10px;letter-spacing:1px;min-width:110px;">${p.nom}${p.auteur?`<div style="font-size:8px;opacity:0.7;font-weight:400;">par ${p.auteur}</div>`:""}</th>`).join("")}
  </tr></thead><tbody>`;
  persos.forEach(rowP=>{
    const acR=getTheme(rowP.role).accent;
    tbl+=`<tr><td style="background:${acR};color:#fff;font-weight:700;font-size:11px;padding:8px 10px;">${rowP.nom}${rowP.auteur?`<div style="font-size:8px;opacity:0.8;font-weight:400;">par ${rowP.auteur}</div>`:""}</td>`;
    persos.forEach(colP=>{
      if(rowP===colP){tbl+=`<td style="background:#2a2a28;text-align:center;color:var(--grey);padding:8px 10px;">—</td>`;return;}
      const lien=findLien(rowP,colP.nom);
      tbl+=`<td style="padding:7px 10px;border-bottom:1px solid var(--lg);border-right:1px solid var(--lg);background:${lien?"#fffcf0":"#faf9f5"};color:${lien?"var(--dark)":"var(--grey)"};font-style:${lien?"normal":"italic"};font-size:11px;text-align:center;">${lien||"?"}</td>`;
    });
    tbl+=`</tr>`;
  });
  tbl+=`</tbody></table></div>`;
  return`<div style="background:var(--paper);border-radius:2px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.4);">${tbl}</div>`;
}

function openTplGallery(adaptIdx){
  S.tplAdaptIdx=adaptIdx;
  S.tplSelected=null;
  const sub=document.getElementById("tpl-topbar-sub");
  if(adaptIdx!==null){
    const nom=S.personnages[adaptIdx].nom||`Perso ${adaptIdx+1}`;
    sub.textContent=`Adapter "${nom}" — choisis un style à lui appliquer`;
  } else {
    sub.textContent="Choisis un point de départ — tout est modifiable";
  }
  renderTplFilters();
  renderTplBody();
  document.getElementById("tpl-overlay").classList.add("open");
}
function closeTplGallery(e){
  if(e&&e.target!==document.getElementById("tpl-overlay"))return;
  document.getElementById("tpl-overlay").classList.remove("open");
  S.tplSelected=null;
}
function setTplFilter(f){S.tplFilter=f;S.tplSelected=null;renderTplFilters();renderTplBody();}

function renderTplFilters(){
  const filters=[
    {id:"all",label:"Tous"},
    {id:"archetype",label:"🎭 Archétypes"},
    {id:"genre",label:"🎬 Genres"},
    {id:"style",label:"🎨 Styles"},
  ];
  document.getElementById("tpl-filters").innerHTML=filters.map(f=>`
    <button class="tpl-filter-btn${S.tplFilter===f.id?" active":""}"
      style="${S.tplFilter===f.id?`background:var(--gold);border-color:var(--gold);`:""}"
      onclick="setTplFilter('${f.id}')">${f.label}</button>`).join("");
}

function renderTplBody(){
  const el=document.getElementById("tpl-body");
  const filtered=TEMPLATES.filter(t=>S.tplFilter==="all"||t._cat===S.tplFilter);
  const byCat={};
  filtered.forEach(t=>{if(!byCat[t._cat])byCat[t._cat]=[];byCat[t._cat].push(t);});

  let html="";
  // Blank card first (only in create mode)
  if(S.tplAdaptIdx===null&&(S.tplFilter==="all"||S.tplFilter==="archetype")){
    if(S.tplFilter==="all") html+=`<div class="tpl-section-ttl">DÉMARRER</div>`;
    html+=`<div class="tpl-grid" style="margin-bottom:24px;">
      <div class="tpl-card-blank" onclick="loadBlankPerso()">
        <div class="tpl-card-blank-icon">✏️</div>
        <div class="tpl-card-blank-lbl">PAGE BLANCHE</div>
        <div style="font-size:10px;color:#444;text-align:center;line-height:1.5;padding:0 8px;">Partir de zéro,<br>sans suggestion</div>
      </div>
    </div>`;
  }

  Object.entries(byCat).forEach(([cat,tpls])=>{
    const catInfo=CATS[cat];
    html+=`<div class="tpl-section-ttl">${catInfo.label}</div>
      <div style="font-size:10px;color:var(--grey);font-style:italic;margin:-6px 0 10px;">${catInfo.desc}</div>
      <div class="tpl-grid">`;
    tpls.forEach((tpl,i)=>{
      const gi=TEMPLATES.indexOf(tpl);
      const isSel=S.tplSelected===gi;
      html+=renderTplCard(tpl,gi,isSel);
    });
    html+=`</div>`;
    // Show diff panel if a card from this cat is selected and in adapt mode
    if(S.tplAdaptIdx!==null&&S.tplSelected!==null&&TEMPLATES[S.tplSelected]._cat===cat){
      html+=renderAdaptDiff(TEMPLATES[S.tplSelected],S.tplAdaptIdx);
    }
  });
  el.innerHTML=html;
}

      <div class="tpl-card-tagline">${tpl._tagline}</div>
      <div class="tpl-card-traits">${traits.map(t=>`<span class="tpl-chip" style="background:${tpl._accent}cc">${t}</span>`).join("")}</div>
      <div class="tpl-card-peur-desir">
        <div class="tpl-pd-item"><div class="tpl-pd-lbl">Peur</div><div class="tpl-pd-val">${(tpl.peur||"").slice(0,40)}${tpl.peur&&tpl.peur.length>40?"…":""}</div></div>

      <div class="tpl-card-actions">

          ${isAdapt?"🎭 Appliquer":"✓ Utiliser ce template"}
        </button>
        ${isSel&&isAdapt?`<button class="tpl-btn-adapt" onclick="event.stopPropagation();applyTplPartial(${gi})">Choisir les champs</button>`:""}
      </div>
    </div>
  </div>`;
}

function selectTpl(gi){
  S.tplSelected=S.tplSelected===gi?null:gi;
  renderTplBody();
}

function renderAdaptDiff(tpl,adaptIdx){
  const d=S.personnages[adaptIdx];
  const FIELD_LABELS={role:"Rôle",traits:"Traits",peur:"Peur",desir:"Désir",physique:"Apparence",style:"Style",detail:"Détail sig.",milieu:"Milieu",passe:"Passé",secret:"Secret",debut:"État initial",declencheur:"Déclencheur",pivot:"Pivot",fin:"État final",registre:"Registre",citation:"Citation",logline:"Logline",casting_notes:"Casting"};
  const diffs=Object.keys(FIELD_LABELS).filter(k=>{
    if(k==="traits") return JSON.stringify(d.traits||[])!==JSON.stringify(tpl.traits||[]);
    return tpl[k]&&tpl[k]!==(d[k]||"");
  });
  if(!diffs.length) return`<div class="adapt-diff"><div class="adapt-diff-ttl">Aucune différence notable — le template est déjà proche de ton personnage.</div></div>`;
  return`<div class="adapt-diff">
    <div class="adapt-diff-ttl">APERÇU DES CHANGEMENTS — ${diffs.length} champ${diffs.length>1?"s":""}</div>
    ${diffs.slice(0,8).map(k=>`<div class="adapt-row">
      <div class="adapt-key">${FIELD_LABELS[k]}</div>
      <div class="adapt-from">${k==="traits"?(d.traits||[]).join(", ")||"—":(d[k]||"—")}</div>
      <div class="adapt-arrow">→</div>
      <div class="adapt-to">${k==="traits"?(tpl.traits||[]).join(", "):tpl[k]}</div>
    </div>`).join("")}
    ${diffs.length>8?`<div style="font-size:10px;color:var(--grey);text-align:center;padding-top:6px;">+${diffs.length-8} autres champs</div>`:""}
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="tpl-btn-use" style="background:${tpl._accent};flex:1;" onclick="applyTpl(${TEMPLATES.indexOf(tpl)})">✓ Tout appliquer</button>
      <button class="tpl-btn-adapt" onclick="applyTplPartial(${TEMPLATES.indexOf(tpl)})">Choisir les champs</button>
    </div>
  </div>`;
}

// ── Load template as new character ──
function loadTpl(gi){
  const tpl=TEMPLATES[gi];
  const newPerso={};
  // Copy all non-meta fields
  Object.keys(tpl).forEach(k=>{if(!k.startsWith("_"))newPerso[k]=Array.isArray(tpl[k])?[...tpl[k]]:tpl[k];});
  S.personnages.push(newPerso);
  S.etapes.push(0);
  S.actif=S.personnages.length-1;
  S.vue="edition";
  document.getElementById("tpl-overlay").classList.remove("open");
  S.tplSelected=null;
  render();
}

function loadBlankPerso(){
  S.personnages.push({});
  S.etapes.push(0);
  S.actif=S.personnages.length-1;
  S.vue="edition";
  document.getElementById("tpl-overlay").classList.remove("open");
  render();
}

// ── Apply template to existing character (full) ──
function applyTpl(gi){
  const tpl=TEMPLATES[gi];
  const idx=S.tplAdaptIdx;
  const kept={nom:S.personnages[idx].nom,auteur:S.personnages[idx].auteur};
  const newPerso={...kept};
  Object.keys(tpl).forEach(k=>{if(!k.startsWith("_"))newPerso[k]=Array.isArray(tpl[k])?[...tpl[k]]:tpl[k];});
  if(kept.nom)newPerso.nom=kept.nom;
  if(kept.auteur)newPerso.auteur=kept.auteur;
  S.personnages[idx]=newPerso;
  S.etapes[idx]=0;
  S.actif=idx;
  S.vue="edition";
  document.getElementById("tpl-overlay").classList.remove("open");
  S.tplSelected=null;
  render();
}

// ── Apply template to existing character (partial — field picker) ──
function applyTplPartial(gi){
  const tpl=TEMPLATES[gi];
  const idx=S.tplAdaptIdx;
  const d=S.personnages[idx];
  const FIELD_LABELS={role:"Rôle",traits:"Traits",peur:"Peur",desir:"Désir",physique:"Apparence",style:"Style",detail:"Détail signature",milieu:"Milieu social",passe:"Passé",secret:"Secret",debut:"État initial",declencheur:"Déclencheur",pivot:"Pivot",fin:"État final",registre:"Registre",citation:"Citation",logline:"Logline",casting_notes:"Notes de casting"};
  const diffs=Object.keys(FIELD_LABELS).filter(k=>{
    if(k==="traits") return JSON.stringify(d.traits||[])!==JSON.stringify(tpl.traits||[]);
    return tpl[k]&&tpl[k]!==(d[k]||"");
  });
  if(!diffs.length){alert("Ce template n'apporte pas de changement notable.");return;}

  // Build picker modal inside adapt diff area
  const picked=new Set(diffs);
  const rows=diffs.map(k=>`
    <label style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #2a2a28;cursor:pointer;">
      <input type="checkbox" checked id="pick_${k}" style="margin-top:3px;accent-color:${tpl._accent};">
      <div>
        <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--grey);margin-bottom:3px;">${FIELD_LABELS[k]}</div>
        <div style="font-size:10px;color:#555;text-decoration:line-through;margin-bottom:2px;">${k==="traits"?(d.traits||[]).join(", ")||"—":(d[k]||"—")}</div>
        <div style="font-size:10px;color:var(--cream);">${k==="traits"?(tpl.traits||[]).join(", "):tpl[k]}</div>
      </div>
    </label>`).join("");

  const container=document.createElement("div");
  container.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1200;display:flex;align-items:center;justify-content:center;padding:20px;";
  container.innerHTML=`<div style="background:#1e1e1c;border-radius:2px;max-width:480px;width:100%;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.8);">
    <div style="background:${tpl._accent};padding:12px 18px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:#fff;">CHOISIR LES CHAMPS — ${tpl._label}</span>
      <button id="picker-close" style="background:none;border:none;color:#fff;cursor:pointer;font-size:18px;">✕</button>
    </div>
    <div style="overflow-y:auto;flex:1;padding:14px 18px;">${rows}</div>
    <div style="padding:14px 18px;border-top:1px solid #2a2a28;display:flex;gap:8px;">
      <button id="picker-apply" style="flex:1;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:12px;padding:9px;background:${tpl._accent};border:none;color:#fff;cursor:pointer;border-radius:2px;">Appliquer la sélection</button>
    </div>
  </div>`;
  document.body.appendChild(container);
  container.querySelector("#picker-close").onclick=()=>document.body.removeChild(container);
  container.querySelector("#picker-apply").onclick=()=>{
    diffs.forEach(k=>{
      if(document.getElementById("pick_"+k)?.checked){
        if(k==="traits")S.personnages[idx].traits=[...tpl.traits];
        else S.personnages[idx][k]=tpl[k];
      }
    });
    document.body.removeChild(container);
    document.getElementById("tpl-overlay").classList.remove("open");
    S.tplSelected=null;
    S.actif=idx;
    S.vue="edition";
    render();
  };
}

// ── GLOSSAIRE ──
function renderGlsList(q=""){
  const filtered=GLOSSAIRE.filter(g=>!q||g.mot.toLowerCase().includes(q.toLowerCase())||g.def.toLowerCase().includes(q.toLowerCase()));
  document.getElementById("gls-list").innerHTML=filtered.map(g=>`<div class="gls-item"><div class="gls-mot">${g.mot}</div><div class="gls-def">${g.def}</div></div>`).join("");
}
function openGls(){renderGlsList();document.getElementById("gls-overlay").classList.add("open");}
function closeGls(){document.getElementById("gls-overlay").classList.remove("open");document.getElementById("gls-input").value="";}

// ── FILMSTRIP ──
(()=>{const fs=document.getElementById("filmstrip");for(let i=0;i<60;i++){const h=document.createElement("div");h.className="hole";fs.appendChild(h);}})();

// ── INIT ──
render();
</script>
