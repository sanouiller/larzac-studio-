<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Larzac Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:    #08090c;
  --amber:  #f0a500;
  --amber2: #c07c00;
  --cream:  #f5eed8;
  --smoke:  #1a1c22;
  --ash:    #2e313b;
  --muted:  #5c6070;
  --dim:    #3a3d48;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--ink);
  color: var(--cream);
  display: flex;
  flex-direction: column;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* FILMSTRIP */
#filmstrip {
  flex-shrink: 0;
  height: 32px;
  background: #000;
  border-bottom: 1px solid #1a1c22;
  display: flex;
  align-items: center;
  padding: 0 12px;
  overflow: hidden;
  position: relative;
}

.perf-track { display: flex; align-items: center; flex: 1; }

.perf {
  width: 18px; height: 13px;
  border-radius: 2px;
  border: 1px solid #333;
  flex-shrink: 0;
  margin: 0 8px;
}

.strip-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: #2a2d36;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
}

/* HERO */
#hero {
  flex-shrink: 0;
  padding: 32px 48px 0;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 24px;
  border-bottom: 1px solid var(--ash);
}

.hero-left { display: flex; flex-direction: column; }

.hero-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .4em;
  text-transform: uppercase;
  color: var(--amber);
  opacity: .7;
  margin-bottom: 4px;
}

.hero-title {
  font-family: 'Anton', sans-serif;
  font-size: clamp(64px, 10vw, 112px);
  line-height: .88;
  letter-spacing: -.01em;
  color: var(--cream);
  user-select: none;
}

.hero-title .studio {
  display: block;
  color: var(--amber);
  text-shadow: 0 0 80px rgba(240,165,0,.25), 0 2px 0 rgba(0,0,0,.8);
}

.hero-title .larzac { display: block; }

.hero-divider {
  height: 3px;
  background: linear-gradient(90deg, var(--amber) 0%, var(--amber2) 40%, transparent 100%);
  margin: 12px 0 16px;
}

.hero-desc {
  font-size: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 300;
}

.hero-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  padding-bottom: 20px;
}

.hero-clock {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  letter-spacing: .06em;
  color: var(--cream);
  line-height: 1;
  text-shadow: 0 0 40px rgba(240,165,0,.2);
}

.hero-date {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--muted);
}

/* SEP BAR */
.sep-bar {
  flex-shrink: 0;
  height: 36px;
  padding: 0 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--smoke);
  border-bottom: 1px solid var(--ash);
}

.sep-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--dim);
}

.sep-count {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--amber);
  opacity: .5;
}

/* GRID */
#grid-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 24px 48px 32px;
  scrollbar-width: thin;
  scrollbar-color: var(--ash) transparent;
}

#grid-scroll::-webkit-scrollbar { width: 3px; }
#grid-scroll::-webkit-scrollbar-thumb { background: var(--ash); }

.apps-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
}

/* CARD */
.app-card {
  position: relative;
  background: var(--smoke);
  border: 1px solid var(--ash);
  cursor: pointer;
  overflow: hidden;
  min-height: 178px;
  display: flex;
  flex-direction: column;
  transition: background .2s;
}

.app-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--amber);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform .3s ease;
}

.app-card:hover::before { transform: scaleX(1); }
.app-card:hover { background: #1e2028; }

.card-num {
  position: absolute;
  top: 14px; right: 14px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px;
  line-height: 1;
  color: var(--ash);
  user-select: none;
  transition: color .3s;
  letter-spacing: -.02em;
}

.app-card:hover .card-num { color: var(--dim); }

.card-body {
  position: relative;
  z-index: 1;
  padding: 22px 22px 14px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.card-cat {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 8px;
  opacity: .7;
  transition: opacity .2s;
}

.app-card:hover .card-cat { opacity: 1; }

.card-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: .04em;
  line-height: .95;
  color: var(--cream);
  transition: color .2s;
  margin-bottom: 10px;
}

.app-card:hover .card-name { color: #fff; }

.card-desc {
  font-size: 11.5px;
  line-height: 1.65;
  color: var(--muted);
  font-weight: 300;
  max-width: 26ch;
  flex: 1;
  transition: color .2s;
}

.app-card:hover .card-desc { color: #8a8e9a; }

.card-foot {
  position: relative;
  z-index: 1;
  padding: 10px 22px;
  border-top: 1px solid var(--ash);
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: border-color .2s;
}

.app-card:hover .card-foot { border-color: var(--dim); }

.card-cta {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--amber);
  opacity: 0;
  transform: translateX(-6px);
  transition: opacity .25s, transform .25s;
}

.app-card:hover .card-cta { opacity: .8; transform: translateX(0); }

.card-arrow {
  font-size: 18px;
  color: var(--amber);
  opacity: .15;
  transition: opacity .2s, transform .2s;
}

.app-card:hover .card-arrow { opacity: .8; transform: translateX(5px); }

/* OVERLAY */
#overlay {
  display: none;
  position: fixed; inset: 0;
  z-index: 10000;
  flex-direction: column;
  background: #000;
}

#overlay.on { display: flex; }

#overlay-nav {
  flex-shrink: 0;
  height: 40px;
  background: #000;
  border-bottom: 1px solid #1a1c22;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 12px;
}

#back-btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--amber);
  background: none;
  border: 1px solid rgba(240,165,0,.25);
  padding: 5px 16px;
  cursor: pointer;
  transition: all .2s;
  line-height: 1;
}

#back-btn:hover { background: rgba(240,165,0,.06); border-color: var(--amber); }

#overlay-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
}

#spinner-wrap {
  position: absolute;
  inset: 40px 0 0;
  background: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
  transition: opacity .3s;
}

#spinner-wrap.gone { opacity: 0; pointer-events: none; }

.spinner {
  width: 32px; height: 32px;
  border: 1.5px solid rgba(240,165,0,.15);
  border-top-color: var(--amber);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.spinner-txt {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--muted);
}

#app-frame { flex: 1; border: none; width: 100%; display: block; }

/* ANIMATIONS */
@keyframes up {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.app-card { animation: up .35s ease both; }
.app-card:nth-child(1) { animation-delay: .04s }
.app-card:nth-child(2) { animation-delay: .08s }
.app-card:nth-child(3) { animation-delay: .12s }
.app-card:nth-child(4) { animation-delay: .16s }
.app-card:nth-child(5) { animation-delay: .20s }
.app-card:nth-child(6) { animation-delay: .24s }

@keyframes heroIn {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}

#hero { animation: heroIn .5s ease both; }

/* FOOTER */
#footer {
  flex-shrink: 0;
  height: 28px;
  padding: 0 48px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--ash);
  background: var(--smoke);
}

.foot-l, .foot-r {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--dim);
}

/* RESPONSIVE */
@media (max-width: 960px) {
  #hero, #grid-scroll, .sep-bar, #footer { padding-left: 28px; padding-right: 28px; }
  .apps-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 640px) {
  #hero { padding: 18px 18px 0; grid-template-columns: 1fr; }
  #grid-scroll { padding: 16px 18px 24px; }
  .sep-bar, #footer { padding: 0 18px; }
  .apps-grid { grid-template-columns: 1fr; }
  .hero-clock { font-size: 36px; }
}
</style>
</head>
<body>

<div id="filmstrip">
  <div class="perf-track" id="perfs"></div>
  <div class="strip-label">LARZAC STUDIO — CLUB AUDIOVISUEL — KODAK 5219</div>
</div>

<div id="hero">
  <div class="hero-left">
    <div class="hero-eyebrow">Club Audiovisuel · Production Tools</div>
    <div class="hero-title">
      <span class="larzac">LARZAC</span>
      <span class="studio">STUDIO</span>
    </div>
    <div class="hero-divider"></div>
    <div class="hero-desc">Sélectionner un outil de production</div>
  </div>
  <div class="hero-right">
    <div class="hero-clock" id="clock">--:--</div>
    <div class="hero-date" id="date-lbl">---</div>
  </div>
</div>

<div class="sep-bar">
  <div class="sep-label">Outils disponibles</div>
  <div class="sep-count" id="count-lbl"></div>
</div>

<div id="grid-scroll">
  <div class="apps-grid" id="grid"></div>
</div>

<div id="footer">
  <div class="foot-l">Larzac Studio — Tous outils en un</div>
  <div class="foot-r" id="foot-r"></div>
</div>

<div id="overlay">
  <div id="overlay-nav">
    <button id="back-btn" onclick="close_()">← Accueil</button>
    <div id="overlay-label"></div>
  </div>
  <div id="spinner-wrap">
    <div class="spinner"></div>
    <div class="spinner-txt">Chargement...</div>
  </div>
  <iframe id="app-frame" src="about:blank"></iframe>
</div>

<script>
const APPS = [
  { id:'lab',       file:'tournage-retro_12.html', cat:'Tournage',    name:'LE LAB',          desc:'Guide interactif de tournage — matériel, conseils, checklists, mode terrain.' },
  { id:'scenario',  file:'scenario.html',          cat:'Écriture',    name:'SCÉNARIOLAB',     desc:'Éditeur de scénario format cinéma — scènes, dialogues, structure narrative.' },
  { id:'perso',     file:'perso.html',             cat:'Personnages',  name:'FICHES PERSO',    desc:'Création des fiches personnages — physique, psychologie, arc narratif.' },
  { id:'fiche',     file:'fiche_technique.html',   cat:'Production',  name:'FICHE TECHNIQUE', desc:'Document de production complet — équipe, matériel, lieux, planning.' },
  { id:'plansol',   file:'plan_sol.html',          cat:'Décors',      name:'PLAN DE SOL',     desc:'Éditeur visuel de plan de tournage — caméras, acteurs, décors.' },
  { id:'generique', file:'genericmaker.html',      cat:'Post-prod',   name:'GÉNÉRIQUE MAKER', desc:'Créateur de génériques animés — typographies cinéma, templates, export.' },
];

(function() {
  const track = document.getElementById('perfs');
  const n = Math.floor((window.innerWidth - 24) / 34);
  for (let i = 0; i < n; i++) {
    const d = document.createElement('div');
    d.className = 'perf';
    track.appendChild(d);
  }
})();

function tick() {
  const n = new Date(), p = x => String(x).padStart(2,'0');
  document.getElementById('clock').textContent = p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
  const J = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
  const M = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'];
  document.getElementById('date-lbl').textContent = J[n.getDay()]+' '+n.getDate()+' '+M[n.getMonth()]+' '+n.getFullYear();
}
tick(); setInterval(tick, 1000);

const grid = document.getElementById('grid');
APPS.forEach((app, i) => {
  const card = document.createElement('div');
  card.className = 'app-card';
  card.innerHTML = `
    <div class="card-num">${String(i+1).padStart(2,'0')}</div>
    <div class="card-body">
      <div class="card-cat">${app.cat}</div>
      <div class="card-name">${app.name}</div>
      <div class="card-desc">${app.desc}</div>
    </div>
    <div class="card-foot">
      <div class="card-cta">Ouvrir</div>
      <div class="card-arrow">→</div>
    </div>
  `;
  card.addEventListener('click', () => open_(app));
  grid.appendChild(card);
});

document.getElementById('count-lbl').textContent = APPS.length + ' apps · Echap pour revenir';
document.getElementById('foot-r').textContent = new Date().getFullYear() + ' · Club AV Larzac';

const overlay = document.getElementById('overlay');
const frame   = document.getElementById('app-frame');
const spinner = document.getElementById('spinner-wrap');
const label   = document.getElementById('overlay-label');

function open_(app) {
  overlay.classList.add('on');
  label.textContent = app.cat + '  ·  ' + app.name;
  spinner.classList.remove('gone');
  frame.src = 'about:blank';
  requestAnimationFrame(() => {
    frame.src = app.file;
    frame.onload = () => spinner.classList.add('gone');
  });
  history.replaceState(null,'','#'+app.id);
}

function close_() {
  overlay.classList.remove('on');
  frame.src = 'about:blank';
  spinner.classList.add('gone');
  history.replaceState(null,'',location.pathname);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && overlay.classList.contains('on')) close_();
});

window.addEventListener('load', () => {
  const h = location.hash.slice(1);
  if (h) { const a = APPS.find(x => x.id === h); if (a) open_(a); }
});
</script>
</body>
</html>
